<!DOCTYPE html>
<html>
<body style="background:#111;color:#00ff00;text-align:center;font-family:monospace;padding:50px">

<h1>🐧 Linux Insta Downloader</h1>

<input id="url" placeholder="Instagram URL" style="padding:15px;width:80%">

<br><br>

<button onclick="download()" style="padding:15px">
DOWNLOAD
</button>

<p id="msg"></p>

<script>
async function download(){

let url=document.getElementById("url").value;
let msg=document.getElementById("msg");

if(!url){
msg.innerHTML="Enter link";
return;
}

msg.innerHTML="Downloading...";

try{

let res=await fetch("http://192.168.8.100:5000/download",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
url:url
})
});

let blob=await res.blob();

let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="instagram.mp4";
a.click();

msg.innerHTML="Done";

}catch(e){

msg.innerHTML="Error";

}

}
</script>

</body>
</html>
